<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNO ENGINE PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0f1f, #000);
    font-family: sans-serif;
    color: white;
}

/* TABLE */
.table {
    position: relative;
    height: 100vh;
}

/* CENTER PILE */
.pile {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 130px;
}

/* PLAYER ZONES */
.player {
    position: absolute;
    display: flex;
    gap: 6px;
}

/* positions */
.bottom { bottom: 20px; left: 50%; transform: translateX(-50%); }
.top { top: 20px; left: 50%; transform: translateX(-50%); }
.left { left: 20px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
.right { right: 20px; top: 50%; transform: translateY(-50%) rotate(90deg); }

/* CARD */
.card {
    width: 70px;
    height: 110px;
    border-radius: 16px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    transform-origin: center;
}

/* center oval */
.center {
    background: white;
    color: black;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* COLORS */
.red { background: linear-gradient(135deg,#ff3b3b,#a00000); }
.blue { background: linear-gradient(135deg,#3b82ff,#002e80); }
.green { background: linear-gradient(135deg,#3bff57,#007a2e); }
.yellow { background: linear-gradient(135deg,#ffd93b,#b38f00); color:black;}
.wild { background: conic-gradient(red,blue,green,yellow); }

/* glow active */
.active {
    box-shadow: 0 0 20px #00ffea;
}
</style>
</head>

<body>

<div class="table">

    <!-- center pile -->
    <div class="pile" id="pile"></div>

    <!-- players -->
    <div id="players"></div>

</div>

<script>

/* ===== ENGINE STATE ===== */
let lastState = {};
let lastTopCard = null;

/* ===== PLAYER POSITIONS ===== */
function getPosition(i) {
    return ["bottom","top","left","right"][i % 4];
}

/* ===== CARD BUILDER ===== */
function buildCard(value) {
    if (!value) return "";

    const parts = value.split(" ");
    let color = parts[0];
    let text = parts[1] || parts[0];

    let cls = "wild";
    if (color === "Red") cls = "red";
    else if (color === "Blue") cls = "blue";
    else if (color === "Green") cls = "green";
    else if (color === "Yellow") cls = "yellow";

    return `<div class="card ${cls}" data-value="${value}">
                <div class="center">${text}</div>
            </div>`;
}

/* ===== RENDER PLAYERS ===== */
function renderPlayers(data) {
    let html = "";
    let i = 0;

    for (const [uid, cards] of Object.entries(data)) {
        html += `
            <div class="player ${getPosition(i)}" data-uid="${uid}">
                ${cards.map(c => buildCard(c)).join("")}
            </div>
        `;
        i++;
    }

    document.getElementById("players").innerHTML = html;
}

/* ===== FIND LAST PLAYED CARD ===== */
function detectMove(prev, curr) {
    for (const uid in prev) {
        const oldCards = prev[uid] || [];
        const newCards = curr[uid] || [];

        if (oldCards.length > newCards.length) {
            // card removed = played
            return oldCards.find(c => !newCards.includes(c));
        }
    }
    return null;
}

/* ===== ANIMATE TO PILE ===== */
function animateToPile(cardValue) {
    const cards = document.querySelectorAll(`.card[data-value="${cardValue}"]`);
    if (!cards.length) return;

    const card = cards[0];
    const pile = document.getElementById("pile");

    const rect = card.getBoundingClientRect();
    const pileRect = pile.getBoundingClientRect();

    const clone = card.cloneNode(true);
    clone.style.position = "fixed";
    clone.style.left = rect.left + "px";
    clone.style.top = rect.top + "px";
    document.body.appendChild(clone);

    gsap.to(clone, {
        x: pileRect.left - rect.left,
        y: pileRect.top - rect.top,
        scale: 1.2,
        duration: 0.5,
        onComplete: () => {
            pile.innerHTML = clone.outerHTML;
            clone.remove();
        }
    });
}

/* ===== MAIN UPDATE LOOP ===== */
async function update() {
    try {
        const res = await fetch('/api/update');
        const data = await res.json();

        const move = detectMove(lastState, data);

        renderPlayers(data);

        if (move && move !== lastTopCard) {
            animateToPile(move);
            lastTopCard = move;
        }

        lastState = JSON.parse(JSON.stringify(data));

    } catch(e) {
        console.log(e);
    }
}

/* LOOP */
setInterval(update, 800);
update();

</script>

</body>
</html>
