<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNO LIVE ENGINE</title>

<style>
/* ===== BACKGROUND (ALIVE EFFECT) ===== */
body {
    margin: 0;
    overflow-x: hidden;
    font-family: sans-serif;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: white;
}

/* moving glow */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,0,150,0.15), transparent 60%);
    animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
    0% { transform: translate(-20%, -20%); }
    50% { transform: translate(0%, 0%); }
    100% { transform: translate(-20%, -20%); }
}

/* ===== TABLE ===== */
.table {
    perspective: 1200px;
    padding: 20px;
}

/* player area */
.player {
    margin: 25px auto;
    max-width: 900px;
    transform: rotateX(10deg);
}

/* card row */
.cards {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* ===== UNO CARD ===== */
.card {
    width: 75px;
    height: 115px;
    border-radius: 16px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.3s ease, box-shadow 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    animation: deal 0.4s ease;
}

/* deal animation */
@keyframes deal {
    from {
        transform: translateY(-200px) scale(0.5);
        opacity: 0;
    }
    to {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
}

/* hover lift */
.card:hover {
    transform: translateY(-12px) rotateY(12deg) scale(1.08);
    box-shadow: 0 15px 40px rgba(0,0,0,1);
}

/* card inner */
.card-inner {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* oval center */
.center {
    width: 45px;
    height: 45px;
    background: white;
    color: black;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* corners */
.corner {
    position: absolute;
    font-size: 12px;
}

.top-left { top: 6px; left: 8px; }
.bottom-right {
    bottom: 6px;
    right: 8px;
    transform: rotate(180deg);
}

/* COLORS */
.red { background: linear-gradient(135deg, #ff3b3b, #b30000); }
.blue { background: linear-gradient(135deg, #3b82ff, #003cb3); }
.green { background: linear-gradient(135deg, #3bff57, #009933); }
.yellow { background: linear-gradient(135deg, #ffd93b, #b38f00); color: black; }
.wild {
    background: conic-gradient(red, blue, green, yellow);
}

/* PLAYER LABEL */
.uid {
    margin-bottom: 10px;
    color: #ff00ff;
    font-size: 13px;
}

/* status */
.status {
    text-align: center;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="table">
    <h2 style="text-align:center;">🎮 UNO LIVE ENGINE</h2>
    <div id="dashboard"></div>
    <div class="status" id="status">SYNC...</div>
</div>

<script>

/* ===== SMART RENDER ENGINE ===== */
function formatCard(value) {
    if (!value) return "";

    const parts = value.split(" ");
    let color = parts[0];
    let text = parts[1] || parts[0];

    let cls = "wild";
    if (color === "Red") cls = "red";
    else if (color === "Blue") cls = "blue";
    else if (color === "Green") cls = "green";
    else if (color === "Yellow") cls = "yellow";

    return `
        <div class="card">
            <div class="card-inner ${cls}">
                <div class="corner top-left">${text}</div>
                <div class="corner bottom-right">${text}</div>
                <div class="center">${text}</div>
            </div>
        </div>
    `;
}

/* ===== SMOOTH UPDATE (NO FLICKER) ===== */
let lastData = "";

async function updateData() {
    try {
        const res = await fetch('/api/update');
        const data = await res.json();

        const jsonStr = JSON.stringify(data);
        if (jsonStr === lastData) return; // prevent re-render
        lastData = jsonStr;

        let html = "";

        for (const [uid, cards] of Object.entries(data || {})) {
            html += `
                <div class="player">
                    <div class="uid">PLAYER: ${uid}</div>
                    <div class="cards">
                        ${cards.map(c => formatCard(c)).join("")}
                    </div>
                </div>
            `;
        }

        document.getElementById('dashboard').innerHTML = html;
        document.getElementById('status').innerText =
            "SYNC: " + new Date().toLocaleTimeString();

    } catch (e) {
        console.log("error", e);
    }
}

/* smooth loop */
setInterval(updateData, 800);
updateData();

</script>

</body>
</html>
