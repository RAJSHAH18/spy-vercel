<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNO ARC ENGINE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0f1f, #000);
    font-family: sans-serif;
    overflow: hidden;
}

/* TABLE */
.table {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* CENTER PILE */
.pile {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PLAYERS */
.player {
    position: absolute;
}

.bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }
.top { top: 10px; left: 50%; transform: translateX(-50%); }
.left { left: 10px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
.right { right: 10px; top: 50%; transform: translateY(-50%) rotate(90deg); }

/* ARC HAND */
.hand {
    position: relative;
    height: 140px;
}

/* CARD */
.card {
    width: 70px;
    height: 110px;
    position: absolute;
    border-radius: 14px;
    transform-origin: center bottom;
    box-shadow: 0 8px 20px rgba(0,0,0,0.8);
    cursor: pointer;
}

/* CARD INNER */
.card-inner {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

/* CENTER */
.center {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* COLORS */
.red { background:#e53935; }
.blue { background:#1e88e5; }
.green { background:#43a047; }
.yellow { background:#fdd835; color:black;}
.wild { background:conic-gradient(red,blue,green,yellow); }
</style>
</head>

<body>

<div class="table">
    <div class="pile" id="pile"></div>
    <div id="players"></div>
</div>

<script>

/* ===== ENGINE STATE ===== */
let lastState = {};
let lastMove = null;

/* ===== POSITIONS ===== */
const positions = ["bottom","top","left","right"];

/* ===== CARD BUILDER ===== */
function buildCard(value) {
    const parts = value.split(" ");
    let color = parts[0];
    let text = parts[1] || parts[0];

    let cls = "wild";
    if (color === "Red") cls = "red";
    else if (color === "Blue") cls = "blue";
    else if (color === "Green") cls = "green";
    else if (color === "Yellow") cls = "yellow";

    return `
        <div class="card" data-value="${value}">
            <div class="card-inner ${cls}">
                <div class="center">${text}</div>
            </div>
        </div>`;
}

/* ===== ARC LAYOUT ===== */
function layoutArc(container) {
    const cards = container.querySelectorAll(".card");
    const total = cards.length;
    const spread = 60; // arc spread

    cards.forEach((card, i) => {
        const offset = i - (total - 1) / 2;
        const angle = offset * (spread / total);
        const x = offset * 30;

        gsap.set(card, {
            x: x,
            y: Math.abs(offset) * 5,
            rotation: angle
        });
    });
}

/* ===== RENDER ===== */
function render(data) {
    let html = "";
    let i = 0;

    for (const [uid, cards] of Object.entries(data)) {

        if (i === 0) {
            // bottom player = ARC
            html += `
            <div class="player bottom">
                <div class="hand" data-hand>
                    ${cards.map(c => buildCard(c)).join("")}
                </div>
            </div>`;
        } else {
            html += `
            <div class="player ${positions[i]}">
                ${cards.map(c => buildCard(c)).join("")}
            </div>`;
        }

        i++;
    }

    document.getElementById("players").innerHTML = html;

    const hand = document.querySelector("[data-hand]");
    if (hand) layoutArc(hand);
}

/* ===== DETECT MOVE ===== */
function detect(prev, curr) {
    for (const uid in prev) {
        const a = prev[uid] || [];
        const b = curr[uid] || [];

        if (a.length > b.length) {
            return a.find(x => !b.includes(x));
        }
    }
    return null;
}

/* ===== PLAY ANIMATION ===== */
function animatePlay(value) {
    const card = document.querySelector(`.card[data-value="${value}"]`);
    if (!card) return;

    const rect = card.getBoundingClientRect();
    const pile = document.getElementById("pile");
    const pileRect = pile.getBoundingClientRect();

    const clone = card.cloneNode(true);
    clone.style.position = "fixed";
    clone.style.left = rect.left + "px";
    clone.style.top = rect.top + "px";
    document.body.appendChild(clone);

    gsap.to(clone, {
        x: pileRect.left - rect.left,
        y: pileRect.top - rect.top,
        rotation: 360,
        scale: 1.2,
        duration: 0.6,
        ease: "power3.out",
        onComplete: () => {
            pile.innerHTML = clone.outerHTML;
            clone.remove();
        }
    });
}

/* ===== LOOP ===== */
async function update() {
    const res = await fetch('/api/update');
    const data = await res.json();

    const move = detect(lastState, data);

    render(data);

    if (move && move !== lastMove) {
        animatePlay(move);
        lastMove = move;
    }

    lastState = JSON.parse(JSON.stringify(data));
}

setInterval(update, 800);
update();

</script>

</body>
</html>
