<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNO LIVE TRACKER</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #0a0a0a, #000);
    color: #fff;
}

/* TABLE LAYOUT */
.table {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* PLAYER BLOCK */
.player {
    margin: 15px 0;
    width: 95%;
    max-width: 900px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 15px;
}

.uid {
    font-size: 14px;
    color: #ff4df2;
    margin-bottom: 10px;
}

/* CARD ROW */
.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

/* UNO CARD */
.card {
    width: 70px;
    height: 110px;
    border-radius: 14px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 26px;
    color: white;
    box-shadow: 0 6px 15px rgba(0,0,0,0.7);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: scale(1.1);
}

/* corner numbers */
.corner {
    position: absolute;
    font-size: 12px;
}

.top-left {
    top: 6px;
    left: 8px;
}

.bottom-right {
    bottom: 6px;
    right: 8px;
    transform: rotate(180deg);
}

/* center oval */
.center {
    background: white;
    color: black;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* COLORS */
.red { background: #e53935; }
.blue { background: #1e88e5; }
.green { background: #43a047; }
.yellow { background: #fdd835; color: black; }
.wild { background: linear-gradient(45deg, red, blue, green, yellow); }

/* STATUS */
.status {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="table">
    <h2>🎮 UNO LIVE TRACKER</h2>
    <div id="dashboard">Connecting...</div>
    <div class="status" id="status">SYNC: OFFLINE</div>
</div>

<script>

/* 🔥 UNO CARD BUILDER */
function formatCard(value) {
    if (!value) return "";

    const parts = value.split(" ");
    let color = parts[0];
    let text = parts[1] || parts[0];

    let cls = "wild";

    if (color === "Red") cls = "red";
    else if (color === "Blue") cls = "blue";
    else if (color === "Green") cls = "green";
    else if (color === "Yellow") cls = "yellow";

    return `
        <div class="card ${cls}">
            <div class="corner top-left">${text}</div>
            <div class="corner bottom-right">${text}</div>
            <div class="center">${text}</div>
        </div>
    `;
}

/* 🔄 DATA FETCH */
async function updateData() {
    try {
        const res = await fetch('/api/update');
        const data = await res.json();

        let html = "";

        if (!data || Object.keys(data).length === 0) {
            document.getElementById('dashboard').innerHTML = "WAITING FOR DATA...";
            return;
        }

        for (const [uid, cards] of Object.entries(data)) {

            html += `
                <div class="player">
                    <div class="uid">PLAYER: ${uid}</div>
                    <div class="cards">
                        ${Array.isArray(cards) ? cards.map(c => formatCard(c)).join("") : ""}
                    </div>
                </div>
            `;
        }

        document.getElementById('dashboard').innerHTML = html;
        document.getElementById('status').innerText =
            "SYNC: " + new Date().toLocaleTimeString();

    } catch (e) {
        console.error(e);
    }
}

setInterval(updateData, 800);
updateData();

</script>

</body>
</html>
