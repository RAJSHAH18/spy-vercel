<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WAYFLOW | SPY OS</title>

<style>
:root {
    --neon-green: #00ff41;
    --neon-pink: #ff00ff;
    --dark-bg: #0d0d0d;
}

body {
    background: radial-gradient(circle, #111, #000);
    color: var(--neon-green);
    font-family: 'Courier New', monospace;
    padding: 20px;
}

/* container */
.container {
    border: 2px solid #222;
    padding: 20px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
}

/* title */
h1 {
    color: var(--neon-pink);
    border-bottom: 2px solid var(--neon-pink);
    padding-bottom: 10px;
}

/* player block */
.player-hand {
    margin: 20px 0;
    padding: 15px;
    border: 1px solid #333;
    border-radius: 10px;
    background: #0a0a0a;
}

.uid {
    color: var(--neon-pink);
    font-size: 0.85em;
    margin-bottom: 10px;
    display: block;
}

/* cards row */
.cards-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

/* CARD */
.card {
    width: 70px;
    height: 100px;
    border-radius: 12px;
    position: relative;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    transition: transform 0.2s ease;
}

/* hover */
.card:hover {
    transform: scale(1.08);
}

/* corners */
.rank.top {
    position: absolute;
    top: 6px;
    left: 8px;
    font-size: 12px;
}

.rank.bottom {
    position: absolute;
    bottom: 6px;
    right: 8px;
    transform: rotate(180deg);
    font-size: 12px;
}

/* center */
.center {
    font-size: 22px;
}

/* status */
.status {
    font-size: 0.75em;
    color: #666;
    text-align: right;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">
    <h1>📡 LIVE TRANSMISSION: VERCEL_EDGE</h1>
    <div id="dashboard">WAITING FOR UPLINK...</div>
    <div class="status" id="last-update">SYNC: OFFLINE</div>
</div>

<script>

/* 🔥 PERFECT CARD FORMATTER (MATCHES YOUR BACKEND) */
function formatCard(value) {
    if (!value || typeof value !== "string") return "";

    const parts = value.split(" ");

    let color = parts[0];
    let text = parts[1] || parts[0]; // handles WILD, +2, etc

    const colorMap = {
        "Red": "#ff4d4d",
        "Blue": "#4da6ff",
        "Green": "#4dff88",
        "Yellow": "#ffd24d"
    };

    let bg = colorMap[color] || "#222";
    let textColor = colorMap[color] ? "#000" : "#fff";

    return `
        <div class="card" style="background:${bg}; color:${textColor};">
            <div class="rank top">${text}</div>
            <div class="rank bottom">${text}</div>
            <div class="center">${text}</div>
        </div>
    `;
}

async function updateData() {
    try {
        const res = await fetch('/api/update');
        const data = await res.json();

        let html = "";
        const entries = Object.entries(data || {});

        if (entries.length === 0) {
            document.getElementById('dashboard').innerHTML = "SIGNAL IDLE...";
            return;
        }

        for (const [uid, cards] of entries) {

            html += `
                <div class="player-hand">
                    <span class="uid">TARGET_UID: ${uid}</span>
                    <div class="cards-list">
                        ${
                            Array.isArray(cards)
                            ? cards.map(c => formatCard(c)).join('')
                            : ''
                        }
                    </div>
                </div>
            `;
        }

        document.getElementById('dashboard').innerHTML = html;
        document.getElementById('last-update').innerHTML =
            "LAST SYNC: " + new Date().toLocaleTimeString();

    } catch (e) {
        console.error("Sync Error", e);
    }
}

setInterval(updateData, 800);
updateData();

</script>

</body>
</html>
